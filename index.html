<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0f1419;color:#e7e9ea;display:flex;justify-content:center}
    .app{width:100%;max-width:600px;min-height:100vh;border-left:1px solid #2f3336;border-right:1px solid #2f3336}
    header{padding:12px;font-size:20px;font-weight:bold;border-bottom:1px solid #2f3336;display:flex;justify-content:space-between;align-items:center}
    button{background:#1d9bf0;color:#fff;border:none;padding:6px 12px;border-radius:20px;cursor:pointer}
    .composer{padding:12px;border-bottom:1px solid #2f3336;display:none}
    textarea{width:100%;background:transparent;border:none;resize:none;color:#e7e9ea;font-size:16px;outline:none}
    .tweet{padding:12px;border-bottom:1px solid #2f3336;position:relative}
    .user{font-weight:bold;cursor:pointer}
    .time{color:#71767b;font-size:12px;margin-left:6px}
    .actions{margin-top:6px;display:flex;gap:12px;font-size:14px;color:#71767b}
    .actions span{cursor:pointer}
    #profileModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);justify-content:center;align-items:center}
    #profileModal .modal-content{background:#0f1419;padding:20px;border-radius:10px;width:300px;display:flex;flex-direction:column;gap:10px}
    #profileModal input{padding:8px;border-radius:6px;border:none;background:#1a1f26;color:#e7e9ea;outline:none}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <span>Aurora</span>
      <div>
        <button id="profileBtn">Profile</button>
        <button id="authBtn">Login</button>
      </div>
    </header>

    <div class="composer" id="composer">
      <textarea id="text" rows="3" maxlength="280" placeholder="Šta se dešava?"></textarea>
      <button onclick="post()">Post</button>
    </div>

    <div id="feed"></div>
  </div>

  <div id="profileModal">
    <div class="modal-content">
      <h3>Edit Profile</h3>
      <input type="text" id="displayName" placeholder="Display Name" />
      <button id="saveProfile">Save</button>
      <button onclick="closeProfile()">Cancel</button>
    </div>
  </div>

<script>
let user = null;
const feed = document.getElementById('feed');
const composer = document.getElementById('composer');
const authBtn = document.getElementById('authBtn');
const profileBtn = document.getElementById('profileBtn');
const profileModal = document.getElementById('profileModal');
const displayNameInput = document.getElementById('displayName');

// Netlify Identity events
netlifyIdentity.on('init', u => setUser(u));
netlifyIdentity.on('login', u => { setUser(u); netlifyIdentity.close(); });
netlifyIdentity.on('logout', () => setUser(null));
netlifyIdentity.init();

function setUser(u){
  user = u;
  if(user){
    composer.style.display='block';
    authBtn.textContent='Logout';
    displayNameInput.value = user.user_metadata.full_name || '';
  } else {
    composer.style.display='none';
    authBtn.textContent='Login';
  }
  load();
}

authBtn.onclick = () => user ? netlifyIdentity.logout() : netlifyIdentity.open();
profileBtn.onclick = () => profileModal.style.display='flex';
function closeProfile(){ profileModal.style.display='none'; updateProfile(); }
function updateProfile(){
  if(user){
    user.user_metadata.full_name = displayNameInput.value;
    user.save().then(() => load());
  }
}

// Posts data
function load(){
  const data = JSON.parse(localStorage.getItem('aurora_posts')||'[]');
  feed.innerHTML='';
  data.slice().reverse().forEach(p=>addPost(p));
}

function addPost(p){
  const d=document.createElement('div');
  d.className='tweet';
  d.innerHTML = `
    <div><span class="user" onclick="editUser('${p.user}')">@${p.user}</span><span class="time">${p.time}</span></div>
    <div>${p.text}</div>
    <div class="actions">
      <span onclick="likePost('${p.time}')">♥ ${p.likes||0}</span>
    </div>
  `;
  feed.append(d);
}

function post(){
  const t = document.getElementById('text');
  if(!t.value.trim() || !user) return;
  const data = JSON.parse(localStorage.getItem('aurora_posts')||'[]');
  data.push({
    user: user.user_metadata.full_name || user.email,
    text: t.value,
    time: new Date().toLocaleString(),
    likes:0
  });
  localStorage.setItem('aurora_posts', JSON.stringify(data));
  t.value=''; load();
}

function likePost(time){
  const data = JSON.parse(localStorage.getItem('aurora_posts')||'[]');
  data.forEach(p => { if(p.time===time){ p.likes = (p.likes||0)+1; } });
  localStorage.setItem('aurora_posts', JSON.stringify(data));
  load();
}

function editUser(u){
  if(user && (user.user_metadata.full_name === u || user.email === u)){
    profileModal.style.display='flex';
    displayNameInput.value = u;
  }
}

load();
</script>
</body>
</html>
