<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OSINT Iran Us Telegram Map</title>
    <meta
      name="description"
      content="OSINT map for tracking Iran-Us war."
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div>
        <p class="eyebrow">OSINT map for 45thbrigade</p>
        <h1>45thbrigade Channel Intelligence Map</h1>
        <p>
          Track public signals, incidents, and source points from your 45thbrigade
          Telegram channel.
        </p>
      </div>
      <div class="hero-actions">
        <a href="#map" class="btn primary">Open map</a>
      </div>
    </header>

    <main>
      <section class="controls">
        <div id="stats" class="stats"></div>
      </section>

      <section class="layout">
        <div id="map" aria-label="OSINT map"></div>
        <aside class="sidebar">
          <h2>Observed entries</h2>
          <div id="entryList" class="entry-list"></div>
        </aside>
      </section>

      <section id="data" class="card">
        <h2>other</h2>
        <ol>
          <li>Main update 22h GMT/23 Moscow time.</li>
           <li>main link:45thbrigade.dnps.org.</li>
        </ol>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="script.js"></script>
  </body>
</html>
